<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector de md</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff; --ink: #1f1d1a; --ink-soft: #6b645a;
    --rule: #e6e2da; --accent: #7a3b2e; --bg-sel: #f0ece2;
    --fs: 12px; --measure: 34rem; --lh: 1.7;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "EB Garamond", Georgia, serif; font-size: var(--fs); line-height: var(--lh);
    font-feature-settings: "kern", "liga", "onum", "pnum";
    text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--bg-sel); }
  .wrap { max-width: var(--measure); margin: 0 auto; padding: 4rem 1.5rem 8rem; }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
  a:hover { border-bottom-color: var(--accent); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 1px; }
  .topbar {
    position: sticky; top: 0;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(6px); border-bottom: 1px solid var(--rule); z-index: 10;
  }
  .topbar-inner {
    max-width: var(--measure); margin: 0 auto; padding: 0.75rem 1.5rem;
    display: flex; align-items: baseline; justify-content: space-between; gap: 1rem;
  }
  .brand { font-size: 1.5em; font-weight: 600; letter-spacing: 0.01em; font-style: italic; color: var(--ink); }
  .controls { display: flex; align-items: center; gap: 0.25rem; flex-shrink: 0; }
  .sizebtn {
    font-family: inherit; font-size: 1.15em; line-height: 1; background: none; border: none;
    color: var(--ink-soft); cursor: pointer; padding: 0.35em 0.55em; border-radius: 3px;
  }
  .sizebtn:hover { color: var(--ink); }
  .sizebtn[aria-pressed="true"] { color: var(--accent); font-weight: 600; }
  .index-intro { color: var(--ink-soft); font-size: 1.25em; margin: 0 0 0.4rem; font-style: italic; }
  .openfile {
    display: inline-block; margin: 0 0 2.2rem; font-size: 1.05em; font-style: italic;
    color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; font-family: inherit;
    border-bottom: 1px solid transparent;
  }
  .openfile:hover { border-bottom-color: var(--accent); }
  /* overlay al arrastrar un archivo encima */
  .drop-overlay {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(3px);
    border: 2px dashed var(--accent); margin: 0.6rem;
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay p { font-size: 1.6em; font-style: italic; color: var(--accent); }
  .doc-list { list-style: none; padding: 0; margin: 0; }
  .doc-list li { border-top: 1px solid var(--rule); }
  .doc-list li:last-child { border-bottom: 1px solid var(--rule); }
  .doc-list a { display: block; padding: 1.1rem 0.25rem; font-size: 1.5em; color: var(--ink); border: none; transition: padding-left 0.18s ease; }
  .doc-list a:hover { padding-left: 0.6rem; color: var(--accent); }
  .doc-meta { display: block; font-size: 0.62em; color: var(--ink-soft); font-style: italic; margin-top: 0.1em; }
  .reader { font-size: 1.5em; }
  .reader h1, .reader h2, .reader h3, .reader h4 { line-height: 1.25; font-weight: 600; margin: 2.2em 0 0.6em; }
  .reader h1 { font-size: 1.9em; margin-top: 0; }
  .reader h2 { font-size: 1.45em; }
  .reader h3 { font-size: 1.2em; }
  .reader h4 { font-size: 1.05em; font-style: italic; font-weight: 500; }
  .reader p { margin: 0 0 1.1em; }
  .reader ul, .reader ol { margin: 0 0 1.1em; padding-left: 1.4em; }
  .reader li { margin: 0.3em 0; }
  .reader blockquote { margin: 1.4em 0; padding: 0.2em 0 0.2em 1.2em; border-left: 2px solid var(--rule); color: var(--ink-soft); font-style: italic; }
  .reader hr { border: none; border-top: 1px solid var(--rule); margin: 2.5em 0; }
  .reader img { max-width: 100%; height: auto; display: block; margin: 1.5em auto; }
  .reader table { border-collapse: collapse; width: 100%; margin: 1.4em 0; font-size: 0.92em; }
  .reader th, .reader td { border: 1px solid var(--rule); padding: 0.5em 0.7em; text-align: left; }
  .reader th { background: var(--bg-sel); font-weight: 600; }
  .reader code { font-family: "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; font-size: 0.82em; background: var(--bg-sel); padding: 0.1em 0.35em; border-radius: 3px; }
  .reader pre { background: var(--bg-sel); padding: 1em 1.2em; border-radius: 5px; overflow-x: auto; margin: 1.4em 0; }
  .reader pre code { background: none; padding: 0; font-size: 0.8em; line-height: 1.5; }
  .reader a { border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); }
  .state { color: var(--ink-soft); font-style: italic; font-size: 1.3em; padding: 2rem 0; }
  .state.error { color: var(--accent); }
  .state code { font-family: monospace; font-style: normal; font-size: 0.85em; }
  @media (max-width: 480px) {
    .wrap { padding: 2.5rem 1.2rem 5rem; }
    .topbar-inner { padding: 0.6rem 1.2rem; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand" id="brand">Lector de md</span>
      <div class="controls" id="sizeControls" role="group" aria-label="Tamaño de texto">
        <button class="sizebtn" data-size="M"  aria-pressed="true"  title="Mediano (12)">M</button>
        <button class="sizebtn" data-size="L"  aria-pressed="false" title="Grande (15)">L</button>
        <button class="sizebtn" data-size="XL" aria-pressed="false" title="Extra grande (18)">XL</button>
      </div>
    </div>
  </header>
  <main class="wrap" id="app"><p class="state">Cargando…</p></main>
  <div class="drop-overlay" id="dropOverlay"><p>Suelta el archivo .md aquí</p></div>
  <input type="file" id="fileInput" accept=".md,.markdown,text/markdown" style="display:none">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
  (function () {
    "use strict";
    // CONFIG: por defecto autodetecta desde la URL de GitHub Pages.
    // Si usas dominio propio, rellena owner y repo a mano.
    var CONFIG = { owner: "", repo: "", branch: "main", folder: "fuentes" };

    var app = document.getElementById("app");
    var brand = document.getElementById("brand");
    var SIZES = { M: "12px", L: "15px", XL: "18px" };

    function applySize(key) {
      if (!SIZES[key]) key = "M";
      document.documentElement.style.setProperty("--fs", SIZES[key]);
      try { sessionStorage.setItem("lector-size", key); } catch (e) {}
      document.querySelectorAll(".sizebtn").forEach(function (b) {
        b.setAttribute("aria-pressed", b.dataset.size === key ? "true" : "false");
      });
    }
    document.getElementById("sizeControls").addEventListener("click", function (e) {
      var btn = e.target.closest(".sizebtn");
      if (btn) applySize(btn.dataset.size);
    });
    var savedSize = "M";
    try { savedSize = sessionStorage.getItem("lector-size") || "M"; } catch (e) {}
    applySize(savedSize);

    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
    function showState(msg, isError) {
      app.innerHTML = '<p class="state' + (isError ? " error" : "") + '">' + msg + "</p>";
    }

    function detectRepo() {
      var cfg = { owner: CONFIG.owner, repo: CONFIG.repo, branch: CONFIG.branch, folder: CONFIG.folder };
      if (cfg.owner && cfg.repo) return cfg;
      var host = location.hostname;
      var m = host.match(/^([^.]+)\.github\.io$/i);
      if (m) {
        cfg.owner = cfg.owner || m[1];
        var seg = location.pathname.split("/").filter(Boolean);
        cfg.repo = cfg.repo || (seg.length ? seg[0] : host);
      }
      return cfg;
    }

    var MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    function parseName(filename) {
      var base = filename.replace(/\.md$/i, "");
      var fecha = "", titSlug = base, sortKey = "0000-00-00";
      var dm = base.match(/^(\d{4})-(\d{2})-(\d{2})[-_]?(.*)$/);
      if (dm) {
        sortKey = dm[1] + "-" + dm[2] + "-" + dm[3];
        var mi = parseInt(dm[2], 10) - 1;
        fecha = (MESES[mi] ? (parseInt(dm[3],10) + " de " + MESES[mi] + " de " + dm[1]) : sortKey);
        titSlug = dm[4] || base;
      }
      var titulo = titSlug.replace(/[-_]+/g, " ").replace(/\s+/g, " ").trim();
      titulo = titulo.charAt(0).toUpperCase() + titulo.slice(1);
      return { titulo: titulo, fecha: fecha, sortKey: sortKey };
    }

    function renderIndex(docs) {
      brand.textContent = "Lector de md";
      var opener = '<button class="openfile" id="openLocal">abrir un archivo de tu equipo</button>';
      if (!docs.length) {
        app.innerHTML = '<p class="state">No hay documentos en el repositorio todavía. ' +
                  'Sube archivos <code>.md</code> a la carpeta <code>' + esc(REPO.folder) +
                  '/</code> y aparecerán aquí.</p><p style="margin-top:1.5rem">' + opener + '</p>';
        wireOpener();
        return;
      }
      var html = '<p class="index-intro">' + docs.length +
                 (docs.length === 1 ? " documento" : " documentos") + "</p>" + opener +
                 "<ul class='doc-list'>";
      docs.forEach(function (d, i) {
        var meta = d.fecha ? '<span class="doc-meta">' + esc(d.fecha) + "</span>" : "";
        html += '<li><a href="#' + i + '">' + esc(d.titulo) + meta + "</a></li>";
      });
      html += "</ul>";
      app.innerHTML = html;
      wireOpener();
    }
    function wireOpener() {
      var b = document.getElementById("openLocal");
      if (b) b.addEventListener("click", function () { document.getElementById("fileInput").click(); });
    }

    function renderReader(doc) {
      showState("Cargando documento…");
      fetch(doc.download_url, { cache: "no-cache" })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
        .then(function (md) {
          brand.textContent = doc.titulo;
          app.innerHTML = '<button class="sizebtn" id="back" style="padding-left:0;font-style:italic;color:var(--ink-soft)">‹ índice</button>' +
                          '<article class="reader">' + marked.parse(md) + "</article>";
          document.getElementById("back").addEventListener("click", function () { location.hash = ""; });
          window.scrollTo(0, 0);
        })
        .catch(function (err) {
          brand.textContent = "Lector de md";
          showState("No se pudo abrir <code>" + esc(doc.name) + "</code> (" + esc(err.message) + ").", true);
        });
    }

    // ---- Abrir un .md local (FileReader; no sube nada a ningún servidor) ----
    function openLocalFile(file) {
      if (!file) return;
      if (!/\.(md|markdown)$/i.test(file.name)) {
        brand.textContent = "Lector de md";
        showState("Ese archivo no parece Markdown. Elige un <code>.md</code> o <code>.markdown</code>.", true);
        return;
      }
      var reader = new FileReader();
      reader.onload = function (e) {
        var titulo = file.name.replace(/\.(md|markdown)$/i, "");
        brand.textContent = titulo;
        app.innerHTML = '<button class="sizebtn" id="back" style="padding-left:0;font-style:italic;color:var(--ink-soft)">‹ índice</button>' +
                        '<article class="reader">' + marked.parse(String(e.target.result)) + "</article>";
        document.getElementById("back").addEventListener("click", function () {
          location.hash = ""; renderIndex(DOCS);
        });
        window.scrollTo(0, 0);
      };
      reader.onerror = function () {
        brand.textContent = "Lector de md";
        showState("No se pudo leer el archivo local.", true);
      };
      reader.readAsText(file);
    }

    document.getElementById("fileInput").addEventListener("change", function (e) {
      if (e.target.files && e.target.files[0]) openLocalFile(e.target.files[0]);
      e.target.value = ""; // permite reabrir el mismo archivo
    });

    // Drag & drop sobre toda la ventana
    var overlay = document.getElementById("dropOverlay");
    var dragDepth = 0;
    function hasFiles(e) {
      return e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types || [], "Files") !== -1;
    }
    window.addEventListener("dragenter", function (e) {
      if (!hasFiles(e)) return;
      e.preventDefault(); dragDepth++; overlay.classList.add("active");
    });
    window.addEventListener("dragover", function (e) { if (hasFiles(e)) e.preventDefault(); });
    window.addEventListener("dragleave", function (e) {
      if (!hasFiles(e)) return;
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) overlay.classList.remove("active");
    });
    window.addEventListener("drop", function (e) {
      if (!hasFiles(e)) return;
      e.preventDefault(); dragDepth = 0; overlay.classList.remove("active");
      var f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) openLocalFile(f);
    });

    var DOCS = [];
    function route() {
      var h = location.hash.replace(/^#/, "");
      if (h === "") { renderIndex(DOCS); return; }
      var i = parseInt(h, 10);
      if (isNaN(i) || !DOCS[i]) { renderIndex(DOCS); return; }
      renderReader(DOCS[i]);
    }
    window.addEventListener("hashchange", route);

    var REPO = detectRepo();
    if (!REPO.owner || !REPO.repo) {
      showState("No pude detectar el repositorio automáticamente. Abre <code>index.html</code>, " +
                "busca el bloque <code>CONFIG</code> al inicio del script y rellena " +
                "<code>owner</code> y <code>repo</code> a mano.", true);
      return;
    }

    var apiUrl = "https://api.github.com/repos/" + REPO.owner + "/" + REPO.repo +
                 "/contents/" + REPO.folder + "?ref=" + encodeURIComponent(REPO.branch);

    fetch(apiUrl, { headers: { "Accept": "application/vnd.github+json" }, cache: "no-cache" })
      .then(function (r) {
        if (r.status === 403) throw new Error("rate-limit");
        if (r.status === 404) throw new Error("not-found");
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (items) {
        if (!Array.isArray(items)) throw new Error("respuesta inesperada");
        DOCS = items
          .filter(function (it) { return it.type === "file" && /\.md$/i.test(it.name); })
          .map(function (it) {
            var meta = parseName(it.name);
            return { name: it.name, download_url: it.download_url,
                     titulo: meta.titulo, fecha: meta.fecha, sortKey: meta.sortKey };
          })
          .sort(function (a, b) { return b.sortKey < a.sortKey ? -1 : (b.sortKey > a.sortKey ? 1 : a.name.localeCompare(b.name)); });
        route();
      })
      .catch(function (err) {
        if (err.message === "rate-limit") {
          showState("GitHub limitó temporalmente las peticiones (60 por hora sin autenticar). " +
                    "Espera unos minutos y recarga. Si esto ocurre seguido, conviene volver al " +
                    "listado manual con un archivo <code>index.json</code>.", true);
        } else if (err.message === "not-found") {
          showState("No encontré la carpeta <code>" + esc(REPO.folder) + "/</code> en " +
                    "<code>" + esc(REPO.owner) + "/" + esc(REPO.repo) + "</code> (rama <code>" +
                    esc(REPO.branch) + "</code>). Verifica que exista y tenga al menos un archivo.", true);
        } else {
          showState("No se pudo obtener la lista de documentos (" + esc(err.message) + ").", true);
        }
      });
  })();
  </script>
</body>
</html>
